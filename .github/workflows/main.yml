name: Update SWING Portfolio

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: swing-portfolio-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Korean font
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fonts-nanum
          fc-cache -fv

      - name: Run update script (Notion 업데이트 + 차트 생성)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/update_portfolio.py

      - name: Commit & push chart if changed
        run: |
          git config user.name "swing-portfolio-bot"
          git config user.email "actions@github.com"
          git add charts/
          git diff --quiet --cached || git commit -m "chore: update charts"
          git pull --rebase origin main
          git push
